apiVersion: v1
kind: Namespace
metadata:
  name: frauddetect

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frauddetect-backend
  namespace: frauddetect
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frauddetect-backend
  template:
    metadata:
      labels:
        app: frauddetect-backend
    spec:
      containers:
      - name: backend
        image: frauddetect:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: frauddetect-secrets
              key: database-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: frauddetect-backend-service
  namespace: frauddetect
spec:
  selector:
    app: frauddetect-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
